services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: departarr
      POSTGRES_PASSWORD: departarr
      POSTGRES_DB: departarr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: ./packages/api
    restart: unless-stopped
    depends_on:
      - db
    env_file: .env
    environment:
      DATABASE_URL: postgresql://departarr:departarr@db:5432/departarr
    ports:
      - "3000:3000"
    volumes:
      - ./packages/api:/app
      - /app/node_modules

  web:
    build: ./apps/web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
